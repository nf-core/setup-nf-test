on:
  # PRs and push to main
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
name: test nf-test installation
jobs:
  test:
    runs-on: ubuntu-latest
    name: A test to install nf-test
    strategy:
      matrix:
        NF-TEST_VER:
          - "0.9.3"
        with-pdiff:
          - true
          - false
        with-fast-diff:
          - false
        include:
          - NF-TEST_VER: "0.9.3"
            with-pdiff: false
            with-fast-diff: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: nf-core/setup-nextflow@b4ec1bc7c16a94435159de94a05253542fddf6ef # v3.0.0

      - name: nf-test install action step
        uses: ./
        with:
          version: "${{ matrix.NF-TEST_VER }}"
          install-pdiff: "${{ matrix.with-pdiff }}"
          install-fast-diff: "${{ matrix.with-fast-diff }}"
      - name: Smoke test
        run: nf-test version
      - name: Show diff viewer output (snapshot mismatch)
        run: nf-test test tests/hello.nf.test || true
