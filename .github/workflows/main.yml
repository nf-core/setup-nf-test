on:
  # PRs and push to main
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
name: test nf-test installation
jobs:
  test:
    runs-on: ubuntu-latest
    name: A test to install nf-test
    strategy:
      matrix:
        NF-TEST_VER:
          - "0.9.3"
        with-pdiff:
          - true
          - false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: nf-core/setup-nextflow@b4ec1bc7c16a94435159de94a05253542fddf6ef # v3.0.0

      - name: nf-test install action step
        uses: ./
        with:
          version: "${{ matrix.NF-TEST_VER }}"
          install-pdiff: "${{ matrix.with-pdiff }}"
      - name: Smoke test
        run: nf-test version
      - name: Debug diff-highlight paths
        run: |
          echo "=== which diff-highlight ==="
          which diff-highlight || echo "not in PATH"
          echo "=== known paths ==="
          for p in /usr/share/git-core/contrib/diff-highlight/diff-highlight \
                   /usr/lib/git-core/diff-highlight \
                   /usr/share/doc/git/contrib/diff-highlight/diff-highlight; do
            [ -f "$p" ] && echo "FOUND: $p" || echo "missing: $p"
          done
          echo "=== find any diff-highlight ==="
          find /usr /opt -name "diff-highlight" 2>/dev/null || true
          echo "=== nft-diff wrapper ==="
          cat ~/.nf-test/nft-diff || echo "no wrapper"
      - name: Show diff viewer output (snapshot mismatch)
        run: nf-test test tests/hello.nf.test || true
